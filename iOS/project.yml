name: Splitwork
options:
  bundleIdPrefix: com.shimondeitel.splitwork
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Splitwork:
    type: application
    platform: iOS
    sources:
      - path: Splitwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.splitwork
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Splitwork/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SplitworkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SplitworkTests
      - path: Splitwork.storekit
    dependencies:
      - target: Splitwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.splitwork.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SplitworkUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SplitworkUITests
    dependencies:
      - target: Splitwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.splitwork.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Splitwork:
    build:
      targets:
        Splitwork: all
        SplitworkTests: [test]
        SplitworkUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Splitwork.storekit
    test:
      config: Debug
      storeKitConfiguration: Splitwork.storekit
      targets:
        - SplitworkTests
        - SplitworkUITests
    archive:
      config: Release
